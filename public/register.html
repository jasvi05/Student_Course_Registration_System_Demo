<!DOCTYPE html>
<html>

<head>

<title>Register</title>

<link rel="stylesheet" href="css/style.css">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-5">

<h2>Student Registration</h2>

<form id="registerForm">

<input class="form-control mb-3" id="name" placeholder="Name" required>

<input class="form-control mb-3" id="email" placeholder="Email" required>

<input class="form-control mb-3" id="password" type="password" placeholder="Password" required>

<button class="btn btn-success">Register</button>

</form>

<script src="js/script.js"></script>

</body>

</html>
